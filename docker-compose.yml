services:
  postgres:
    image: postgres:16-alpine
    container_name: coboard-postgres
    environment:
      POSTGRES_USER: coboard
      POSTGRES_PASSWORD: coboard_dev
      POSTGRES_DB: coboard
    ports:
      - "5432:5432"
    volumes:
      - coboard-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coboard"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coboard-redis
    ports:
      - "6379:6379"
    volumes:
      - coboard-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  coboard-pg-data:
  coboard-redis-data:
